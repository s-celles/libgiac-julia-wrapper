# GitHub Actions CI Workflow for GIAC Julia Wrapper
# Builds and tests on Linux (Ubuntu) and macOS

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        julia-version: ['1.10']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Julia ${{ matrix.julia-version }}
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Install Meson and Ninja
        run: pip3 install meson ninja

      - name: Install GIAC (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgiac-dev libgiac0

      - name: Install GIAC (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install miniforge
          eval "$(conda shell.bash hook)"
          conda activate base
          conda install -c conda-forge giac gmp -y
          # Export conda paths for subsequent steps
          CONDA_BASE=$(conda info --base)
          echo "CONDA_PREFIX=$CONDA_BASE" >> $GITHUB_ENV
          echo "$CONDA_BASE/bin" >> $GITHUB_PATH
          echo "$CONDA_BASE/lib" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=$CONDA_BASE/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Install CxxWrap.jl
        run: julia -e 'using Pkg; Pkg.add("CxxWrap")'

      - name: Get CxxWrap prefix path
        id: cxxwrap
        run: |
          CXXWRAP_PREFIX=$(julia -e 'using CxxWrap; print(CxxWrap.prefix_path())')
          echo "prefix=$CXXWRAP_PREFIX" >> $GITHUB_OUTPUT

      - name: Configure (Meson)
        run: |
          meson setup builddir \
            --cmake-prefix-path=${{ steps.cxxwrap.outputs.prefix }}

      - name: Build
        run: meson compile -C builddir

      - name: Run tests
        run: meson test -C builddir --verbose
