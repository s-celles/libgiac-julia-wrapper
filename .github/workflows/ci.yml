# GitHub Actions CI Workflow for GIAC Julia Wrapper
# Builds and tests on Linux (Ubuntu), macOS, and Windows
# Uses s-celles/giac fork (dev branch) built from source

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        julia-version: ['1.10']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout GIAC (s-celles fork)
        uses: actions/checkout@v4
        with:
          repository: s-celles/giac
          ref: dev
          path: giac-src

      - name: Setup Julia ${{ matrix.julia-version }}
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      # -- Install build tools --

      - name: Install Meson and Ninja (Linux)
        if: runner.os == 'Linux'
        run: pip3 install meson ninja

      - name: Install Meson and Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install meson ninja

      - name: Install Meson and Ninja (Windows)
        if: runner.os == 'Windows'
        run: pip install meson ninja

      # -- Install GIAC dependencies --

      - name: Install GIAC dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev

      - name: Install GIAC dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install gmp mpfr

      - name: Install GIAC dependencies (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gmp mingw-w64-x86_64-mpfr mingw-w64-x86_64-pkg-config mingw-w64-x86_64-meson mingw-w64-x86_64-ninja mingw-w64-x86_64-gcc

      # -- Build and install GIAC from source --

      - name: Build and install GIAC (Linux)
        if: runner.os == 'Linux'
        run: |
          cd giac-src
          meson setup builddir --prefix=$GITHUB_WORKSPACE/giac-install --buildtype=release
          meson compile -C builddir
          meson install -C builddir
          echo "PKG_CONFIG_PATH=$GITHUB_WORKSPACE/giac-install/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/giac-install/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Build and install GIAC (macOS)
        if: runner.os == 'macOS'
        run: |
          cd giac-src
          meson setup builddir --prefix=$GITHUB_WORKSPACE/giac-install --buildtype=release
          meson compile -C builddir
          meson install -C builddir
          echo "PKG_CONFIG_PATH=$GITHUB_WORKSPACE/giac-install/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=$GITHUB_WORKSPACE/giac-install/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$GITHUB_WORKSPACE/giac-install/lib:$LIBRARY_PATH" >> $GITHUB_ENV
          echo "CPATH=$GITHUB_WORKSPACE/giac-install/include:$CPATH" >> $GITHUB_ENV

      - name: Build and install GIAC (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd giac-src
          meson setup builddir --prefix=$GITHUB_WORKSPACE/giac-install --buildtype=release
          meson compile -C builddir
          meson install -C builddir

      # -- Build the wrapper --

      - name: Install CxxWrap.jl
        run: julia -e 'using Pkg; Pkg.add("CxxWrap")'

      - name: Get CxxWrap prefix path
        id: cxxwrap
        shell: bash
        run: |
          CXXWRAP_PREFIX=$(julia -e 'using CxxWrap; print(CxxWrap.prefix_path())')
          echo "prefix=$CXXWRAP_PREFIX" >> $GITHUB_OUTPUT

      - name: Configure (Meson) (Linux)
        if: runner.os == 'Linux'
        run: |
          meson setup builddir \
            --cmake-prefix-path=${{ steps.cxxwrap.outputs.prefix }}

      - name: Configure (Meson) (macOS)
        if: runner.os == 'macOS'
        run: |
          meson setup builddir \
            --cmake-prefix-path=${{ steps.cxxwrap.outputs.prefix }} \
            --pkg-config-path=$GITHUB_WORKSPACE/giac-install/lib/pkgconfig \
            -Dgiac_include_dir=$GITHUB_WORKSPACE/giac-install/include

      - name: Configure (Meson) (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          meson setup builddir \
            --cmake-prefix-path=${{ steps.cxxwrap.outputs.prefix }} \
            --pkg-config-path=$GITHUB_WORKSPACE/giac-install/lib/pkgconfig \
            -Dgiac_include_dir=$GITHUB_WORKSPACE/giac-install/include

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: meson compile -C builddir

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: meson compile -C builddir

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: meson test -C builddir --verbose

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: meson test -C builddir --verbose
