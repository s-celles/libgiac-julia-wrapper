# GitHub Actions CI Workflow for GIAC Julia Wrapper
# Builds and tests on Linux (Ubuntu), macOS, and Windows
# Uses GIAC_jll for pre-built giac binaries on all platforms

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        julia-version: ['1.10']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Julia ${{ matrix.julia-version }}
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      # -- Install build tools --

      - name: Install Meson and Ninja (Linux)
        if: runner.os == 'Linux'
        run: pip3 install meson ninja

      - name: Install Meson and Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install meson ninja

      - name: Install Meson and Ninja (Windows)
        if: runner.os == 'Windows'
        run: pip install meson ninja pkgconf

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # -- Install Julia packages and extract JLL artifact paths --

      - name: Install Julia packages
        run: julia -e 'using Pkg; Pkg.add(["CxxWrap", "GIAC_jll", "GMP_jll"])'

      - name: Get dependency paths
        id: deps
        shell: bash
        run: |
          julia -e '
            using CxxWrap, GIAC_jll, GMP_jll
            println("cxxwrap_prefix=", CxxWrap.prefix_path())
            println("giac_artifact=", GIAC_jll.artifact_dir)
            println("gmp_artifact=", GMP_jll.artifact_dir)
          ' | while IFS='=' read -r key value; do
            echo "$key=$value" >> $GITHUB_OUTPUT
          done

      - name: Set library search paths (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "LIBRARY_PATH=${{ steps.deps.outputs.giac_artifact }}/lib:${{ steps.deps.outputs.gmp_artifact }}/lib:$LIBRARY_PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${{ steps.deps.outputs.giac_artifact }}/lib:${{ steps.deps.outputs.gmp_artifact }}/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "CPATH=${{ steps.deps.outputs.giac_artifact }}/include/giac:${{ steps.deps.outputs.giac_artifact }}/include:${{ steps.deps.outputs.gmp_artifact }}/include:$CPATH" >> $GITHUB_ENV

      - name: Set library search paths (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "LIBRARY_PATH=${{ steps.deps.outputs.giac_artifact }}/lib:${{ steps.deps.outputs.gmp_artifact }}/lib:$LIBRARY_PATH" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=${{ steps.deps.outputs.giac_artifact }}/lib:${{ steps.deps.outputs.gmp_artifact }}/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "CPATH=${{ steps.deps.outputs.giac_artifact }}/include/giac:${{ steps.deps.outputs.giac_artifact }}/include:${{ steps.deps.outputs.gmp_artifact }}/include:$CPATH" >> $GITHUB_ENV

      - name: Set library search paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $giacLib = "${{ steps.deps.outputs.giac_artifact }}\bin"
          $gmpLib = "${{ steps.deps.outputs.gmp_artifact }}\bin"
          $giacInclude = "${{ steps.deps.outputs.giac_artifact }}\include\giac"
          $gmpInclude = "${{ steps.deps.outputs.gmp_artifact }}\include"
          # MSVC uses LIB for library search and INCLUDE for headers
          echo "LIB=$giacLib;$gmpLib;$env:LIB" >> $env:GITHUB_ENV
          echo "INCLUDE=$giacInclude;$gmpInclude;$env:INCLUDE" >> $env:GITHUB_ENV
          echo "PATH=$giacLib;$gmpLib;$env:PATH" >> $env:GITHUB_ENV

      - name: Debug paths
        shell: bash
        run: |
          echo "CxxWrap prefix: ${{ steps.deps.outputs.cxxwrap_prefix }}"
          echo "GIAC artifact: ${{ steps.deps.outputs.giac_artifact }}"
          echo "GMP artifact: ${{ steps.deps.outputs.gmp_artifact }}"
          echo "--- GIAC include ---"
          ls "${{ steps.deps.outputs.giac_artifact }}/include/" 2>/dev/null || echo "no include dir"
          ls "${{ steps.deps.outputs.giac_artifact }}/include/giac/" 2>/dev/null | head -5 || echo "no giac subdir"
          echo "--- GIAC lib ---"
          ls "${{ steps.deps.outputs.giac_artifact }}/lib/" 2>/dev/null | head -10 || echo "no lib dir"
          echo "--- GIAC bin ---"
          ls "${{ steps.deps.outputs.giac_artifact }}/bin/" 2>/dev/null | head -10 || echo "no bin dir"
          echo "--- GMP lib ---"
          ls "${{ steps.deps.outputs.gmp_artifact }}/lib/" 2>/dev/null | head -10 || echo "no lib dir"
          echo "--- GMP include ---"
          ls "${{ steps.deps.outputs.gmp_artifact }}/include/" 2>/dev/null | head -10 || echo "no include dir"

      # -- Configure, build, and test --

      - name: Configure (Meson) (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          meson setup builddir \
            --cmake-prefix-path=${{ steps.deps.outputs.cxxwrap_prefix }} \
            -Dgiac_include_dir=${{ steps.deps.outputs.giac_artifact }}/include/giac

      - name: Configure (Meson) (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          meson setup builddir --cmake-prefix-path="${{ steps.deps.outputs.cxxwrap_prefix }}" -Dgiac_include_dir="${{ steps.deps.outputs.giac_artifact }}\include\giac"

      - name: Build
        run: meson compile -C builddir

      - name: Run tests
        run: meson test -C builddir --verbose
