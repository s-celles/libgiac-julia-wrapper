# GitHub Actions CI Workflow for GIAC Julia Wrapper
# Builds and tests on Linux (Ubuntu), macOS, and Windows
# Uses GIAC_jll for pre-built giac binaries on all platforms

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        julia-version: ['1.10']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Julia ${{ matrix.julia-version }}
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      # -- Install build tools --

      - name: Install Meson and Ninja (Linux)
        if: runner.os == 'Linux'
        run: pip3 install meson ninja

      - name: Install Meson and Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install meson ninja

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-meson mingw-w64-x86_64-ninja mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-pkg-config

      # -- Install Julia packages and extract JLL artifact paths --

      - name: Install Julia packages
        run: julia -e 'using Pkg; Pkg.add(["CxxWrap", "GIAC_jll", "GMP_jll", "MPFR_jll"])'

      - name: Get dependency paths
        id: deps
        shell: bash
        run: |
          julia -e '
            using CxxWrap, GIAC_jll, GMP_jll, MPFR_jll
            println("cxxwrap_prefix=", CxxWrap.prefix_path())
            println("giac_artifact=", GIAC_jll.artifact_dir)
            println("gmp_artifact=", GMP_jll.artifact_dir)
            println("mpfr_artifact=", MPFR_jll.artifact_dir)
          ' | while IFS='=' read -r key value; do
            echo "$key=$value" >> $GITHUB_OUTPUT
          done

      - name: Debug JLL artifact layout
        shell: bash
        run: |
          echo "=== GIAC ==="
          ls "${{ steps.deps.outputs.giac_artifact }}/include/giac/" 2>/dev/null | head -5 || echo "no include/giac/"
          ls "${{ steps.deps.outputs.giac_artifact }}/lib/" 2>/dev/null | head -10 || echo "no lib/"
          ls "${{ steps.deps.outputs.giac_artifact }}/bin/" 2>/dev/null | head -10 || echo "no bin/"
          echo "=== GMP ==="
          ls "${{ steps.deps.outputs.gmp_artifact }}/include/" 2>/dev/null | head -5
          ls "${{ steps.deps.outputs.gmp_artifact }}/lib/" 2>/dev/null | head -10
          echo "=== MPFR ==="
          ls "${{ steps.deps.outputs.mpfr_artifact }}/include/" 2>/dev/null | head -5
          ls "${{ steps.deps.outputs.mpfr_artifact }}/lib/" 2>/dev/null | head -10

      # -- Configure, build, and test (Linux/macOS) --

      - name: Set library paths (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "LIBRARY_PATH=${{ steps.deps.outputs.giac_artifact }}/lib:${{ steps.deps.outputs.gmp_artifact }}/lib:${{ steps.deps.outputs.mpfr_artifact }}/lib:$LIBRARY_PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${{ steps.deps.outputs.giac_artifact }}/lib:${{ steps.deps.outputs.gmp_artifact }}/lib:${{ steps.deps.outputs.mpfr_artifact }}/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "CPATH=${{ steps.deps.outputs.giac_artifact }}/include/giac:${{ steps.deps.outputs.giac_artifact }}/include:${{ steps.deps.outputs.gmp_artifact }}/include:${{ steps.deps.outputs.mpfr_artifact }}/include:$CPATH" >> $GITHUB_ENV

      - name: Set library paths (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "LIBRARY_PATH=${{ steps.deps.outputs.giac_artifact }}/lib:${{ steps.deps.outputs.gmp_artifact }}/lib:${{ steps.deps.outputs.mpfr_artifact }}/lib:$LIBRARY_PATH" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=${{ steps.deps.outputs.giac_artifact }}/lib:${{ steps.deps.outputs.gmp_artifact }}/lib:${{ steps.deps.outputs.mpfr_artifact }}/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "CPATH=${{ steps.deps.outputs.giac_artifact }}/include/giac:${{ steps.deps.outputs.giac_artifact }}/include:${{ steps.deps.outputs.gmp_artifact }}/include:${{ steps.deps.outputs.mpfr_artifact }}/include:$CPATH" >> $GITHUB_ENV

      - name: Configure (Meson) (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          meson setup builddir \
            --cmake-prefix-path=${{ steps.deps.outputs.cxxwrap_prefix }} \
            -Dgiac_include_dir=${{ steps.deps.outputs.giac_artifact }}/include/giac

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: meson compile -C builddir

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: meson test -C builddir --verbose

      # -- Configure, build, and test (Windows via MSYS2/MinGW) --
      # JLL artifacts on Windows are MinGW-built (.dll.a import libs)

      - name: Configure (Meson) (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CXXWRAP_PREFIX: ${{ steps.deps.outputs.cxxwrap_prefix }}
          GIAC_ARTIFACT: ${{ steps.deps.outputs.giac_artifact }}
          GMP_ARTIFACT: ${{ steps.deps.outputs.gmp_artifact }}
          MPFR_ARTIFACT: ${{ steps.deps.outputs.mpfr_artifact }}
        run: |
          export LIBRARY_PATH="$GIAC_ARTIFACT/lib:$GMP_ARTIFACT/lib:$MPFR_ARTIFACT/lib:$LIBRARY_PATH"
          export CPATH="$GIAC_ARTIFACT/include/giac:$GIAC_ARTIFACT/include:$GMP_ARTIFACT/include:$MPFR_ARTIFACT/include:$CPATH"
          meson setup builddir \
            --cmake-prefix-path="$CXXWRAP_PREFIX" \
            -Dgiac_include_dir="$GIAC_ARTIFACT/include/giac"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          GIAC_ARTIFACT: ${{ steps.deps.outputs.giac_artifact }}
          GMP_ARTIFACT: ${{ steps.deps.outputs.gmp_artifact }}
          MPFR_ARTIFACT: ${{ steps.deps.outputs.mpfr_artifact }}
        run: |
          export LIBRARY_PATH="$GIAC_ARTIFACT/lib:$GMP_ARTIFACT/lib:$MPFR_ARTIFACT/lib:$LIBRARY_PATH"
          meson compile -C builddir

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          GIAC_ARTIFACT: ${{ steps.deps.outputs.giac_artifact }}
          GMP_ARTIFACT: ${{ steps.deps.outputs.gmp_artifact }}
          MPFR_ARTIFACT: ${{ steps.deps.outputs.mpfr_artifact }}
        run: |
          export PATH="$GIAC_ARTIFACT/bin:$GMP_ARTIFACT/bin:$MPFR_ARTIFACT/bin:$PATH"
          meson test -C builddir --verbose
